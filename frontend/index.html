<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportradar Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Sportradar Calendar</div>
    <ul class="navbar-links">
      <li><a href="#">Events</a></li>
      <li><a href="#">Schedule</a></li>
      <li><a href="#">Teams</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Sports Events</h1>

    <div class="filters">
      <select id="filter-sport">
        <option value="">All Sports</option>
      </select>
      <input type="date" id="filter-date" />
      <button id="btn-apply">Apply</button>
      <button id="btn-clear">Clear</button>
    </div>

    <div id="error-msg" class="error hidden"></div>

    <section class="form-section">
      <h2>Add Event</h2>
      <form id="add-event-form" class="event-form">
        <div class="form-row">
          <label>Date<input type="date" name="date_venue" required /></label>
          <label>Time (UTC)<input type="time" name="time_venue_utc" /></label>
          <label>Sport<input type="text" name="sport" placeholder="e.g. Football" required /></label>
        </div>
        <div class="form-row">
          <label>Home Team<input type="text" name="home_team" placeholder="Home team" required /></label>
          <label>Away Team<input type="text" name="away_team" placeholder="Away team" required /></label>
          <label>Description<input type="text" name="description" placeholder="Optional" /></label>
        </div>
        <div class="form-actions">
          <button type="submit">Add Event</button>
          <span id="form-feedback" class="form-feedback hidden"></span>
        </div>
      </form>
    </section>

    <table class="events-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time (UTC)</th>
          <th>Sport</th>
          <th>Match</th>
          <th>Status</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="events-body">
        <tr><td colspan="6" class="loading">Loading events…</td></tr>
      </tbody>
    </table>
  </main>

  <script src="script.js"></script>
</body>
</html>
